# tiger-eye hosts config — copy to ~/.config/tiger-eye/hosts.toml and edit.
#
# Each [[host]] is one machine to monitor. Tokens written as "env:NAME" are
# read from the environment so secrets never sit in this file.

# The machine you run `tiger-eye collect` on.
[[host]]
name = "local"
mode = "local"
port = 47100

# A LAN machine, pulled over an ssh -L tunnel (recommended even on LAN: the
# remote node stays bound to loopback and is reachable only through SSH access).
[[host]]
name  = "lan-box"
mode  = "ssh"
ssh   = "lan-box"           # an entry in ~/.ssh/config, or an mDNS name
port  = 47100
token = "env:TE_TOKEN"

# A data-center server reached via a jump host (configure the jump in
# ~/.ssh/config; the `ssh` alias handles it transparently).
[[host]]
name  = "dc-1"
mode  = "ssh"
ssh   = "dc-1"
port  = 47100
token = "env:TE_TOKEN"

# A LAN device pulled by direct HTTP (convenience only; trusted LAN + token).
# [[host]]
# name  = "lan-device"
# mode  = "lan"
# addr  = "192.168.1.50"
# port  = 47100
# token = "env:TE_TOKEN"
