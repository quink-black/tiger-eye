# tiger-eye hosts config — copy to ~/.config/tiger-eye/hosts.toml and edit.
#
# Each [[host]] is one machine to monitor. Tokens written as "env:NAME" are
# read from the environment so secrets never sit in this file.

# The machine you run `tiger-eye collect` on. The local node enforces the token
# too, so set it here as well (omit only if you start the node with no token).
[[host]]
name  = "local"
mode  = "local"
port  = 47100
token = "env:TE_TOKEN"

# A LAN machine, pulled over an ssh -L tunnel (recommended even on LAN: the
# remote node stays bound to loopback and is reachable only through SSH access).
[[host]]
name  = "lan-box"
mode  = "ssh"
ssh   = "lan-box"           # an entry in ~/.ssh/config, or an mDNS name
port  = 47100
token = "env:TE_TOKEN"

# A data-center server reached via a jump host (configure the jump in
# ~/.ssh/config; the `ssh` alias handles it transparently).
[[host]]
name  = "dc-1"
mode  = "ssh"
ssh   = "dc-1"
port  = 47100
token = "env:TE_TOKEN"

# A LAN device pulled by direct HTTP (convenience only; trusted LAN + token).
# [[host]]
# name  = "lan-device"
# mode  = "lan"
# addr  = "192.168.1.50"
# port  = 47100
# token = "env:TE_TOKEN"

# Notifiers alert you when an agent enters a blocking state
# (waiting_permission or idle). If no [[notifier]] is configured, the default
# is "say" on macOS (falls back to terminal bell on other systems).

# macOS: speak the alert via the `say` command.
# [[notifier]]
# type = "say"

# Any terminal: ring the terminal bell (\a).
# [[notifier]]
# type = "bell"
